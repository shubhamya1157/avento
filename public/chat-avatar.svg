<?xml version="1.0" encoding="UTF-8"?>
<!--
  chat-avatar.svg — the Avento Assistant's badge, shown in the chat widget.
  A self-contained, premium monochrome vector: a sleek supercar silhouette on a
  dark disc with a soft light ring. Matches the site's black/white look, stays
  crisp at any size, and needs no external image. Edit the fills to re-skin.
-->
<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark disc with a faint top-light so the badge reads as a glossy chip. -->
    <radialGradient id="disc" cx="0.34" cy="0.26" r="0.95">
      <stop stop-color="#33333A"/>
      <stop offset="0.55" stop-color="#161619"/>
      <stop offset="1" stop-color="#070708"/>
    </radialGradient>
    <!-- Subtle vertical sheen on the car body. -->
    <linearGradient id="body" x1="48" y1="40" x2="48" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CFCFD4"/>
    </linearGradient>
  </defs>

  <!-- Disc + thin light ring. -->
  <circle cx="48" cy="48" r="46" fill="url(#disc)"/>
  <circle cx="48" cy="48" r="45.5" stroke="#FFFFFF" stroke-opacity="0.22"/>

  <!-- Low-slung supercar silhouette (side profile). -->
  <path
    d="M16 56.5c.4-2.2 2-3.4 4.3-3.6l9.5-.8 6.7-7.8c2.3-2.7 5.6-4.3 9.2-4.4l8.8-.2c4.6-.1 9 1.7 12.2 5l3.3 3.4 6.6 1.4c2.7.6 4.3 2.1 4.6 4.4l.3 2.6c.1 1.1-.7 2.1-1.8 2.2l-5.1.3a8 8 0 0 0-15.9.7l-18.3 1a8 8 0 0 0-15.9.9l-5.4.3c-1.7.1-3.1-1.4-2.9-3.1l.0-2Z"
    fill="url(#body)"/>

  <!-- Windscreen / cabin glass cut from the disc colour. -->
  <path d="M40 47.6l5-5.7c1.4-1.6 3.4-2.5 5.5-2.6l4.1-.1c2 0 3.9.7 5.4 2l3.2 2.8-23.2 3.6Z"
        fill="#0B0B0D"/>

  <!-- A single accent line along the door for a premium detail. -->
  <path d="M34 53.5l30-1.6" stroke="#0B0B0D" stroke-opacity="0.35" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Wheels with bright rims. -->
  <circle cx="34" cy="61" r="6.4" fill="#0B0B0D"/>
  <circle cx="34" cy="61" r="6.4" stroke="#FFFFFF" stroke-width="2.4"/>
  <circle cx="34" cy="61" r="1.8" fill="#FFFFFF"/>
  <circle cx="64" cy="61" r="6.4" fill="#0B0B0D"/>
  <circle cx="64" cy="61" r="6.4" stroke="#FFFFFF" stroke-width="2.4"/>
  <circle cx="64" cy="61" r="1.8" fill="#FFFFFF"/>
</svg>
